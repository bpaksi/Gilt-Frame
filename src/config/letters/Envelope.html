<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Order of the Gilt Frame — Envelope #10</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  @page {
    size: 9.5in 4.125in;
    margin: 0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold-marker: #C8A54B;
    --ink-brown: #2E231A;
  }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink-brown);
    width: 9.5in;
    height: 4.125in;
    margin: 0 auto;
    padding: 0;
    position: relative;
    overflow: hidden;
    background: white;
  }

  /* ── Return address: Marker + org name, upper left ── */
  .return-block {
    position: absolute;
    top: 0.28in;
    left: 0.35in;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8pt;
  }

  .return-block svg {
    filter: drop-shadow(0 1px 2px rgba(30, 22, 16, 0.12));
  }

  .return-org {
    font-family: 'Cinzel', serif;
    font-size: 6.5pt;
    font-weight: 600;
    color: #8B6914;
    letter-spacing: 1.8pt;
    text-transform: uppercase;
    line-height: 1.6;
  }

  /* ── Recipient address block ── */
  /* Centered horizontally; positioned in the middle-lower half vertically */
  .recipient-block {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -44%);
    text-align: left;
  }

  /* Replace with Christine's full name before printing.
     "The Candidate" is thematic but may delay delivery — use her real name. */
  .recipient-name {
    font-style: italic;
    font-size: 13pt;
    font-weight: 500;
    letter-spacing: 0.3pt;
    margin-bottom: 3pt;
  }

  .recipient-address {
    font-size: 12pt;
    line-height: 1.65;
    font-weight: 600;
  }

  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>

  <!-- Return address: Marker + org name -->
  <div class="return-block">
    <svg width="38" height="50" viewBox="0 0 40 52" xmlns="http://www.w3.org/2000/svg">
      <rect x="0.7" y="0.7" width="38.6" height="50.6" rx="1" fill="none"
        stroke="#C8A54B" stroke-width="1.4" />
      <path d="M 12,12 C 12,26 28,22 28,36" fill="none"
        stroke="#C8A54B" stroke-width="1" />
      <path d="M 28,12 C 28,26 12,22 12,36" fill="none"
        stroke="#C8A54B" stroke-width="1" />
      <circle cx="18" cy="35" r="1" fill="#C8A54B" />
      <circle cx="22" cy="35" r="1" fill="#C8A54B" />
      <circle cx="20" cy="32" r="1" fill="#C8A54B" />
      <circle cx="20" cy="16" r="1" fill="#C8A54B" />
    </svg>
    <div class="return-org">
      The Order<br>of the Gilt Frame
    </div>
  </div>

  <!-- Recipient address — reused across all chapters -->
  <div class="recipient-block">
    <div class="recipient-name">Christine McCarthy &middot; Sparrow</div>
    <div class="recipient-address">
      7781 N. 37th St.<br>
      Richland, MI 49083
    </div>
  </div>

</body>
</html>
